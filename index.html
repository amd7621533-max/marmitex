<!DOCTYPE html>
<html lang="pt-br">
<head>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>
    <style>
	
	
	/* Limita a descrição do produto a 2 linhas com "..." */
.desc-produto {
    font-size: 11px; 
    color: #777; 
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
}
	
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f8f9fa; padding-bottom: 80px; }
        
        .banner { 
    width: 100%; 
    height: 200px; 
    background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%), url('./imagens/banner.webp');
    background-size: cover;
    background-position: center;
}
        .header-content { background: #fff; padding: 15px; text-align: center; border-bottom: 1px solid #eee; margin-top: -30px; border-radius: 20px 20px 0 0; position: relative; }
        .logo { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; position: absolute; top: -40px; left: 50%; transform: translateX(-50%); background: #eee; }
        .status { font-size: 12px; color: #27ae60; font-weight: bold; margin-top: 45px; }
        
        /* Container da Navegação */
.nav-categorias {
    display: flex;
    overflow-x: auto;
    padding: 12px 15px;
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 12px;
    border-bottom: 1px solid #f2f2f2;
    scrollbar-width: none; /* Esconde scroll no Firefox */
}

.nav-categorias::-webkit-scrollbar {
    display: none; /* Esconde scroll no Chrome/Safari */
}

/* Estilo das "Pílulas" de Categoria */
.nav-categorias a {
    text-decoration: none;
    color: #666;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    padding: 8px 20px;
    border-radius: 50px;
    border: 1px solid #dcdcdc;
    background: #fff;
    transition: all 0.2s ease;
}



/* Estado Ativo/Clicado (Estilo iFood) */
.nav-categorias a:active, .nav-categorias a.active {
    background-color: #EA1D2C; /* Vermelho iFood */
    color: #fff;
    border-color: #EA1D2C;
    transform: scale(0.95);
}

/* Efeito de hover (apenas para desktop) */
@media (min-width: 768px) {
    .nav-categorias a:hover {
        border-color: #EA1D2C;
        color: #EA1D2C;
    }
}
        /* Seções e Cards */
        .container { padding: 15px; }
        .titulo-secao { 
    margin: 20px 0 10px; 
    font-size: 18px; 
    border-left: 4px solid #EA1D2C; /* Mudado de #e67e22 para vermelho */
    padding-left: 10px; 
}
        .grid-produtos { display: flex; 
			flex-direction: column; 
			gap: 10px; 
		}
        .card {
    display: flex;
    align-items: center;
    background: #fff;
    border-radius: 16px; /* Mais arredondado */
    padding: 12px;
    margin-bottom: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.03); /* Sombra suave */
    transition: transform 0.2s ease;
}

.card:active {
    transform: scale(0.98); /* Feedback visual ao clicar */
}
				/* Ajusta a imagem para ficar pequena no canto direito */
				.card img { 
					width: 80px; 
					height: 80px; 
					object-fit: contain; 
					background: #fff; 
					border-radius: 8px;
					border: 1px solid #f0f0f0;
					margin-left: 10px;
				}

				.card-body { 
					flex: 1; /* Faz o texto ocupar o espaço restante */
					padding: 0; 
				}
				/* Estilo do botão verde de "Adicionar" igual ao seu print */
.btn-adicionar {
    border: 1px solid #EA1D2C; /* Mudado de verde para vermelho */
    color: #EA1D2C;            /* Mudado de verde para vermelho */
    background: transparent;
    padding: 5px 15px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}
        .nome { font-size: 14px; font-weight: bold; height: 38px; overflow: hidden; }
        .preco { color: #333; font-weight: bold; font-size: 16px; margin-top: 5px; }

        /* Bottom Nav */
.floating-cart {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #EA1D2C; /* Mudado de verde para vermelho */
    color: white;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(234, 29, 44, 0.3); /* Sombra avermelhada */
    z-index: 999;
    text-decoration: none;
}
        .nav-btn { text-align: center; color: #999; font-size: 10px; text-decoration: none; }
		/* Badge de contador no carrinho */
.cart-count {
    background: #e74c3c;
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    position: absolute;
    top: 5px;
    right: 25%;
}

/* Modal do Carrinho */
#cart-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
}

html {
    scroll-behavior: smooth;
}

section {
    scroll-margin-top: 70px; /* Ajuste esse valor conforme a altura da sua nav */
}

.cart-content {
    background: white;
    width: 90%;
    max-width: 400px;
    margin: 50px auto;
    border-radius: 15px;
    padding: 20px;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #eee;
}

.qty-btn {
    background: #f1f1f1;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

/* Botão Moderno de Finalizar */
.btn-finalizar {
    background: #EA1D2C; /* Mudado de verde para vermelho */
    color: white;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 16px;
    margin-top: 20px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(234, 29, 44, 0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* Modal de Detalhes do Produto */
#product-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
}

.product-detail-content {
    background: white;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    height: 100%;
    overflow-y: auto;
    position: relative;
    display: flex;
    flex-direction: column;
}

.detail-img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.detail-body {
    padding: 20px;
    flex: 1;
}

.obs-box {
    width: 100%;
    height: 80px;
    margin-top: 15px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    resize: none;
    font-family: inherit;
}

.btn-confirm-add {
    background: #EA1D2C; /* Mudado de verde para vermelho */
    color: white;
    padding: 15px;
    border: none;
    width: 100%;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    position: sticky;
    bottom: 0;
}
    </style>
</head>
<body>

<div id="product-modal">
    <div class="product-detail-content">
        <button onclick="closeProductModal()" style="position: absolute; top: 15px; left: 15px; background: white; border-radius: 50%; width: 35px; height: 35px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">X</button>
        
        <img id="modal-img" src="" class="detail-img" loading="lazy">
        
        <div class="detail-body">
            <h2 id="modal-nome"></h2>
            <p id="modal-desc" style="color: #666; margin-top: 10px; font-size: 14px;"></p>
            <p id="modal-preco" style="color: #27ae60; font-weight: bold; font-size: 20px; margin-top: 15px;"></p>
            
            <h4 style="margin-top: 25px;">Alguma observação?</h4>
            <textarea id="modal-obs" class="obs-box" placeholder="Ex: Retirar cebola, ponto da carne, etc..."></textarea>
        </div>

        <button class="btn-confirm-add" id="btn-confirmar">Adicionar ao Pedido</button>
    </div>
</div>



    <div class="banner"></div>
    <div class="header-content">
    <img src="./imagens/logo.webp" alt="Logo da Loja" class="logo">
    <div id="status-loja" class="status" style="transition: color 0.3s;">● VERIFICANDO...</div>
    <h2>Comida Caseira</h2>
	</div>

    <nav class="nav-categorias">
    <a href="#prato-dia" class="active">Prato do Dia</a>
    <a href="#promocao">Promoções</a>
    <a href="#comidas">Comidas</a>
    <a href="#bebidas">Bebidas</a>
</nav>

    <div class="container">
        <div id="secoes-container">
            <section id="prato-dia"><h3 class="titulo-secao">Prato do Dia</h3><div class="grid-produtos"></div></section>
            <section id="promocao"><h3 class="titulo-secao">Promoções</h3><div class="grid-produtos"></div></section>
            <section id="comidas"><h3 class="titulo-secao">Comidas</h3><div class="grid-produtos"></div></section>
            <section id="bebidas"><h3 class="titulo-secao">Bebidas</h3><div class="grid-produtos"></div></section>
        </div>
    </div>
	
<div id="cart-modal">
    <div class="cart-content">
        <h3>Seu Pedido</h3>
        <div id="cart-items-list"></div>
        
        <div style="margin-top: 20px;">
            <input type="text" id="cliente-nome" placeholder="Seu Nome" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            
            <input type="text" id="cliente-cep" placeholder="Digite seu CEP" maxlength="9" onkeyup="buscarCEP(this.value)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="text" id="cliente-endereco" placeholder="Rua, Bairro e Cidade" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; background-color: #f9f9f9;">
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="number" id="cliente-numero" placeholder="Número" style="width:40%; padding:10px; border:1px solid #ddd; border-radius:8px;">
                <input type="text" id="cliente-complemento" placeholder="Comp. (Opcional)" style="width:60%; padding:10px; border:1px solid #ddd; border-radius:8px;">
            </div>

            <select id="pagamento" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
                <option value="">Forma de Pagamento</option>
                <option value="Pix">Pix</option>
                <option value="Cartão">Cartão</option>
                <option value="Dinheiro">Dinheiro</option>
            </select>
        </div>

        <div style="margin-top: 20px; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between;">
            <span>Total:</span>
            <span id="cart-total-price">R$ 0.00</span>
        </div>
        
        <button class="btn-finalizar" onclick="finalizarPedido()">
            Finalizar no WhatsApp
        </button>
        <button onclick="toggleCart()" style="width:100%; margin-top:10px; background:none; border:none; color:#999; cursor:pointer;">Continuar Comprando</button>
    </div>
</div>

<a href="javascript:void(0)" class="floating-cart" onclick="toggleCart()">
    🛒
    <span class="cart-count">0</span>
</a>

<div id="success-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <div style="font-size: 60px; margin-bottom: 15px;">✅</div>
        <h2 style="color: #333; margin-bottom: 10px;">Pedido Iniciado!</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Seu pedido foi direcionado para o nosso WhatsApp. Continue o atendimento por lá!</p>
        <button onclick="fecharSucesso()" style="background: #EA1D2C; color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px;">Voltar ao Cardápio</button>
    </div>
</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB-kF0SqbeRpJZrfcav2tlhIX3HUvAcs3o",
    authDomain: "comidamae-86350.firebaseapp.com",
    projectId: "comidamae-86350",
    storageBucket: "comidamae-86350.firebasestorage.app",
    messagingSenderId: "298569952723",
    appId: "1:298569952723:web:e00d98d4895ecb85d21326"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];
let produtoSelecionado = null;

// --- LÓGICA DE NAVEGAÇÃO SUAVE (FIXED) ---
const links = document.querySelectorAll('.nav-categorias a');

links.forEach(link => {
    link.addEventListener('click', function(e) {
        e.preventDefault(); 
        
        links.forEach(l => l.classList.remove('active'));
        this.classList.add('active');

        const targetId = this.getAttribute('href');
        const targetElement = document.querySelector(targetId);
        
        if (targetElement) {
            targetElement.scrollIntoView({
                behavior: 'smooth',
                block: 'start'
            });
        }
    });
});

// --- FUNÇÕES DO PRODUTO E CARRINHO ---
window.abrirDetalhes = (nome, desc, preco, imagem) => {
    produtoSelecionado = { nome, preco, imagem };
    document.getElementById('modal-nome').innerText = nome;
    document.getElementById('modal-desc').innerText = desc || "Sem descrição disponível.";
    document.getElementById('modal-preco').innerText = `R$ ${parseFloat(preco).toFixed(2)}`;
    document.getElementById('modal-img').src = imagem || 'https://via.placeholder.com/200';
    document.getElementById('modal-obs').value = ""; 
    document.getElementById('product-modal').style.display = 'block';
};

window.closeProductModal = () => {
    document.getElementById('product-modal').style.display = 'none';
};

document.getElementById('btn-confirmar').onclick = () => {
    const obs = document.getElementById('modal-obs').value;
    cart.push({
        nome: produtoSelecionado.nome,
        preco: parseFloat(produtoSelecionado.preco),
        quantidade: 1,
        observacao: obs
    });
    updateCartUI();
    closeProductModal();
};

window.updateQty = (index, delta) => {
    cart[index].quantidade += delta;
    if (cart[index].quantidade <= 0) cart.splice(index, 1);
    updateCartUI();
};

function updateCartUI() {
    const list = document.getElementById('cart-items-list');
    const totalEl = document.getElementById('cart-total-price');
    const countBadge = document.querySelector('.cart-count');
    
    list.innerHTML = '';
    let total = 0;
    let totalItens = 0;

    cart.forEach((item, index) => {
        total += item.preco * item.quantidade;
        totalItens += item.quantidade;
        list.innerHTML += `
            <div class="cart-item">
                <div>
                    <strong>${item.nome}</strong><br>
                    <small>R$ ${item.preco.toFixed(2)}</small>
                    ${item.observacao ? `<br><span style="font-size:10px; color:#EA1D2C;">Obs: ${item.observacao}</span>` : ''}
                </div>
                <div style="display: flex; align-items: center;">
                    <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                    <span style="margin: 0 10px">${item.quantidade}</span>
                    <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                </div>
            </div>
        `;
    });

    totalEl.innerText = `R$ ${total.toFixed(2)}`;
    if(countBadge) countBadge.innerText = totalItens;
}

window.toggleCart = () => {
    const modal = document.getElementById('cart-modal');
    modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
};

window.buscarCEP = async (cep) => {
    const cepLimpo = cep.replace(/\D/g, '');
    if (cepLimpo.length === 8) {
        document.getElementById('cliente-endereco').value = "Buscando endereço...";
        try {
            const response = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
            const data = await response.json();
            if (!data.erro) {
                document.getElementById('cliente-endereco').value = `${data.logradouro}, ${data.bairro} - ${data.localidade}/${data.uf}`;
                document.getElementById('cliente-numero').focus(); 
            } else {
                document.getElementById('cliente-endereco').value = "";
                alert("CEP não encontrado!");
            }
        } catch (error) {
            document.getElementById('cliente-endereco').value = "";
            alert("Erro ao buscar o CEP.");
        }
    }
};

window.fecharSucesso = () => document.getElementById('success-modal').style.display = 'none';

window.finalizarPedido = () => {
    if (window.lojaAberta === false) {
        return alert("Desculpe, nossa loja está fechada no momento! Confira nosso horário de funcionamento.");
    }
    if (cart.length === 0) return alert("Seu carrinho está vazio!");
    
    const nome = document.getElementById('cliente-nome').value;
    const cep = document.getElementById('cliente-cep').value;
    const endereco = document.getElementById('cliente-endereco').value;
    const numero = document.getElementById('cliente-numero').value;
    const complemento = document.getElementById('cliente-complemento').value;
    const pagamento = document.getElementById('pagamento').value;

    if (!nome || !endereco || !numero || !pagamento) return alert("Preencha Nome, CEP, Número e Pagamento.");
    
    let enderecoCompleto = `${endereco}, Nº ${numero}`;
    if (complemento) enderecoCompleto += ` (${complemento})`;
    if (cep) enderecoCompleto += ` - CEP: ${cep}`;

    let mensagem = `*Novo Pedido - Comida Caseira*\n*Cliente:* ${nome}\n*Endereço:* ${enderecoCompleto}\n*Pagamento:* ${pagamento}\n\n*Itens:*\n`;

    let total = 0;
    cart.forEach(item => {
        const subtotal = item.preco * item.quantidade;
        mensagem += `• ${item.quantidade}x *${item.nome}* - R$ ${subtotal.toFixed(2)}\n`;
        if(item.observacao) mensagem += `   _Obs: ${item.observacao}_\n`; 
        total += subtotal;
    });

    mensagem += `\n*Total: R$ ${total.toFixed(2)}*`;
    const fone = "5521991295214"; 
    
    window.open(`https://wa.me/${fone}?text=${encodeURIComponent(mensagem)}`, '_blank');
    
    document.getElementById('cart-modal').style.display = 'none';
    document.getElementById('success-modal').style.display = 'flex';
    
    cart = [];
    updateCartUI();
    document.getElementById('cliente-nome').value = '';
    document.getElementById('cliente-cep').value = '';
    document.getElementById('cliente-endereco').value = '';
    document.getElementById('cliente-numero').value = '';
    document.getElementById('cliente-complemento').value = '';
    document.getElementById('pagamento').value = '';
};

// --- SISTEMA DE HORÁRIO ---
function verificarHorario() {
    const horarios = {
        0: { abre: 9, fecha: 22 }, 1: null, 2: { abre: 9, fecha: 22 }, 
        3: { abre: 9, fecha: 22 }, 4: { abre: 9, fecha: 22 }, 
        5: { abre: 9, fecha: 23 }, 6: { abre: 9, fecha: 23 }
    };
    const agora = new Date();
    const diaSemana = agora.getDay();
    const horaAtual = agora.getHours();
    const statusElement = document.getElementById('status-loja');
    const horarioHoje = horarios[diaSemana];

    window.lojaAberta = (horarioHoje !== null && horaAtual >= horarioHoje.abre && horaAtual < horarioHoje.fecha);

    if (window.lojaAberta) {
        statusElement.innerText = "● ABERTO AGORA";
        statusElement.style.color = "#27ae60";
    } else {
        statusElement.innerText = "● FECHADO";
        statusElement.style.color = "#EA1D2C";
    }
}
verificarHorario();
setInterval(verificarHorario, 60000);

// --- RENDERIZAÇÃO DO FIREBASE (COM PROTEÇÃO DE ASPAS E DESCRIÇÃO) ---
onSnapshot(collection(db, "produtos"), (snapshot) => {
    document.querySelectorAll('.grid-produtos').forEach(grid => grid.innerHTML = '');

    snapshot.forEach((doc) => {
        const p = doc.data();
        const card = `
            <div class="card">
                <div class="card-body">
                    <div class="nome" style="height: auto; margin-bottom: 5px;">${p.nome}</div>
                    <div class="desc-produto">${p.descricao || ''}</div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div class="preco" style="margin-top: 0;">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                        <button class="btn-adicionar" onclick="abrirDetalhes(\`${p.nome}\`, \`${p.descricao || ''}\`, '${p.preco}', '${p.imagem}')">Adicionar</button>
                    </div>
                </div>
                <img src="${p.imagem || 'https://via.placeholder.com/200'}" alt="${p.nome}" loading="lazy">
            </div>
        `;
        const targetGrid = document.querySelector(`#${p.categoria} .grid-produtos`);
        if(targetGrid) targetGrid.innerHTML += card;
    });
});
</script>
</body>
</html>
